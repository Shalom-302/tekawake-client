# Déploiement Dokploy du client en mode PULL (image pré-buildée par GitHub Actions,
# cf. .github/workflows/build.yml). Aucun build sur le VPS → plus d'OOM.
#
# Prérequis :
#   - Le workflow a poussé ghcr.io/shalom-302/tekawake-client:latest
#   - Repo PRIVÉ ⇒ le package GHCR est privé par défaut : configurer un
#     registry GHCR dans Dokploy (user = login GitHub, token = PAT scope
#     read:packages), OU rendre le package public.
#
# Dokploy → Compose Path : docker-compose.image.yml
#   Domains : service web, port 3000, host takawake.kortexai.dev, HTTPS.
services:
  web:
    image: ghcr.io/shalom-302/tekawake-client:latest
    # Force le re-pull de :latest à chaque deploy (sinon `up -d` garde l'image
    # locale et ne récupère jamais la nouvelle build → client figé sur l'ancien).
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"        # interne : Traefik route via dokploy-network
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

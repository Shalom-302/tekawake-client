name: Build & push client image

# Build l'image du client Next.js sur GitHub (pas sur le VPS) et la pousse sur
# GHCR. Dokploy n'a plus qu'à PULL l'image → fini les OOM / builds d'une heure.
# Repo dédié : le client est à la RACINE (contexte = .).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige un nom d'image en minuscules (le owner peut contenir des majuscules).
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tekawake-client" >> "$GITHUB_ENV"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # NEXT_PUBLIC_* sont inlinées au build → on les fige ici.
          build-args: |
            NEXT_PUBLIC_API_URL=https://veille-api.kortexai.dev/api
            NEXT_PUBLIC_WS_URL=wss://veille-api.kortexai.dev/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
